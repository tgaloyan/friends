<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Անակնկալ Տաթևից 🌸</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #ffebee 0%, #fce4ec 50%, #f8bbd0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden; /* Որ թռչող էմոջիները էջից դուրս չգան */
            color: #880e4f;
        }

        .envelope-container {
            background: #ffffff;
            border-radius: 30px;
            padding: 40px 25px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 15px 35px rgba(233, 30, 99, 0.2);
            text-align: center;
            border: 3px solid #f48fb1;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 24px;
            color: #ad1457;
            line-height: 1.5;
            margin-bottom: 30px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.05);
        }

        .main-btn {
            background: linear-gradient(135deg, #ff4081, #ec407a);
            color: white;
            border: none;
            padding: 18px 28px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(236, 64, 122, 0.4);
            transition: all 0.2s ease;
            outline: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            animation: heartbeat 1.5s infinite alternate;
        }

        /* Սրտաձև բաբախող անիմացիա կոճակի համար */
        @keyframes heartbeat {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        .main-btn:active {
            transform: scale(0.95);
            box-shadow: 0 3px 10px rgba(236, 64, 122, 0.3);
        }

        .message-text {
            display: none;
            font-size: 22px;
            font-weight: bold;
            color: #c2185b;
            margin-top: 25px;
            line-height: 1.6;
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Թռչող էմոջիների ոճը */
        .emoji-particle {
            position: fixed;
            bottom: -50px;
            font-size: 30px;
            user-select: none;
            pointer-events: none;
            z-index: 5;
            animation: floatUp 3s linear forwards;
        }

        @keyframes floatUp {
            0% {
                bottom: -50px;
                opacity: 0;
                transform: translateX(0) scale(0.5);
            }
            10% {
                opacity: 1;
                transform: translateX(10px) scale(1.2);
            }
            100% {
                bottom: 105vh;
                opacity: 0;
                transform: translateX(-30px) scale(0.8) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div class="envelope-container">
        <h1 id="title-text">✨ Սեղմի՛ր և տես, թե քեզ ինչ է ուղարկել Տաթևը... 🥰👇</h1>
        
        <button class="main-btn" id="gift-btn" onclick="openSurprise()">
            Բացե՛լ Անակնկալը 🎁❤️
        </button>

        <div class="message-text" id="message-content">
            👑 Թագուհուն 👑<br>
            💋 Տաթևիկից 💋<br>
            <span style="font-size: 15px; font-weight: normal; color: #e91e63; display:block; margin-top:15px;">
                Դու իմ ամենալավ ու թանկ ընկերուհին ես։ Լի՜քը պաչիկներ ու սեր քեզ։ ❤️✨
            </span>
        </div>
    </div>

    <script>
        function openSurprise() {
            // Թաքցնում ենք կոճակը և փոխում վերնագիրը
            document.getElementById('gift-btn').style.display = 'none';
            document.getElementById('title-text').innerHTML = '✨ Անակնկա՜ր... ✨';
            
            // Ցույց ենք տալիս սիրուն խոսքերը
            document.getElementById('message-content').style.display = 'block';

            // Սկսում ենք լիքը էմոջիներ բաց թողնել էկրանին
            for (var i = 0; i < 50; i++) {
                setTimeout(createEmoji, i * 80); // Հերթով, թեթև դադարներով
            }
        }

        function createEmoji() {
            var emojis = ['💋', '👑', '❤️', '💖', '✨', '🌸', '🌹', '💕'];
            var randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
            
            var span = document.createElement('span');
            span.className = 'emoji-particle';
            span.innerText = randomEmoji;
            
            // Էմոջիների պատահական դիրքը հորիզոնական էկրանի վրա
            var randomX = Math.random() * window.innerWidth;
            span.style.left = randomX + 'px';
            
            // Պատահական չափսեր, որ ավելի բնական ու սիրուն լինի
            var randomSize = Math.floor(Math.random() * 20) + 25; // 25px-ից 45px
            span.style.fontSize = randomSize + 'px';
            
            // Պատահական արագություն թռչելու համար (օրինակ՝ 2.5-ից 4 վայրկյան)
            var randomDuration = (Math.random() * 1.5) + 2.5;
            span.style.animationDuration = randomDuration + 's';

            document.body.appendChild(span);
            
            // Թռչելուց հետո ջնջում ենք կոդից, որ էջը չծանրանա
            setTimeout(function() {
                span.remove();
            }, randomDuration * 1000);
        }
    </script>

</body>
</html>
